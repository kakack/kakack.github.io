name: Rhythmic Epistles
description: 欲買桂花同載酒，終不似，少年遊。
url: https://kakack.github.io
#baseurl: /blog
lang: zh-CN
avatar: https://raw.githubusercontent.com/kakack/kakack.github.io/master/_images/logo.jpg
# Favicon for browser tab (use full URL for external image, or path like /_images/icon.jpg for local)
favicon: https://raw.githubusercontent.com/kakack/kakack.github.io/master/_images/icon.jpg
social_image: https://raw.githubusercontent.com/kakack/kakack.github.io/master/_images/logo.jpg
navigation:
  - name: Main
    url: /
  - name: About
    url: /about
  - name: Archive
    url: /archive
  - name: Tags
    url: /tags
paginate: 8
excerpt_separator: <!-- more -->
footer-links:
  email: kyriiiechen@gmail.com
  github: kakack
  instagram: kyriiiec
  linkedin: kakack
  tumblr: kyriiiec
  pinterest: kyriiieck
  twitter: kyriiiec
  facebook: kyriiiec
  weibo: kakack
footer-text: Copyright (c) 2026 Let's talk with the world.
disqus: kakack

# 未启用时可留空或注释，启用时填写 ID 即可
# google_analytics: UA-XXXXXXXXX-X
utteranc:
  repo: kakack/kakack.github.io
permalink: /:title/
paginate_path: /page:num/
version: v1.2.0
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
  math_engine: katex

sass:
  style: :compressed
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-gist
  - jekyll-scholar
  - jekyll-katex
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME

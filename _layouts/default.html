<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  {% include head.html %}
  <body>
    {% include nav.html %}

    {% if page.toc==true %}
      <aside class="toc">
        {% include toc.html html=content %}
      </aside>
    {% endif %}

    <div id="main" role="main" class="wrapper-content">
      <div class="container">
        {{ content }}
      </div>
    </div>

    <div class="wrapper-footer-mobile">
      <footer class="footer">
        {% include footer.html %}
      </footer>
    </div>

    {% include analytics.html %}

    {% if page.toc==true %}
    <script>
      document.getElementById("main").classList.add("withtoc");
    </script>
    {% endif %}

    <script>
      (function () {
        function replaceFeather() {
          if (window.feather && typeof window.feather.replace === "function") {
            window.feather.replace();
          }
        }
        replaceFeather();
        document.addEventListener("DOMContentLoaded", replaceFeather, { once: true });
      })();
    </script>
  </body>
</html>

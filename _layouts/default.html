<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  {% include head.html %}
  <body>
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="切换深色/浅色模式" title="切换深色/浅色模式">Dark mode</button>
    {% include nav.html %}

    {% if page.toc==true %}
      <aside class="toc">
        {% include toc.html html=content %}
      </aside>
    {% endif %}

    <div id="main" role="main" class="wrapper-content">
      <div class="container">
        {{ content }}
      </div>
    </div>

    <div class="wrapper-footer-mobile">
      <footer class="footer">
        {% include footer.html %}
      </footer>
    </div>

    {% include analytics.html %}

    {% if page.toc==true %}
    <script>
      document.getElementById("main").classList.add("withtoc");
    </script>
    <script>
      (function () {
        var toc = document.querySelector(".toc");
        if (!toc) return;

        var container = document.querySelector("#main .container");
        if (!container) return;

        var links = toc.querySelectorAll("a[href^='#']");
        if (!links.length) return;

        var headings = container.querySelectorAll("h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]");
        if (!headings.length) return;

        var offsetFromTop = 100;

        function getCurrentId() {
          var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          var viewportHeight = window.innerHeight;
          var docHeight = document.documentElement.scrollHeight;
          var current = null;

          for (var i = 0; i < headings.length; i++) {
            var rect = headings[i].getBoundingClientRect();
            if (rect.top <= offsetFromTop) {
              current = headings[i];
            }
          }

          if (current) return current.id;
          if (scrollTop < 50 && headings[0]) return headings[0].id;
          if (scrollTop + viewportHeight >= docHeight - 10 && headings.length) return headings[headings.length - 1].id;
          return headings[0] ? headings[0].id : null;
        }

        function updateActive() {
          var id = getCurrentId();
          links.forEach(function (link) {
            var href = link.getAttribute("href") || link.href || "";
            var linkId = href.indexOf("#") >= 0 ? href.replace(/^.*#/, "") : "";
            try { linkId = decodeURIComponent(linkId); } catch (e) {}
            if (linkId === id) {
              link.classList.add("toc-active");
            } else {
              link.classList.remove("toc-active");
            }
          });
        }

        window.addEventListener("scroll", updateActive, { passive: true });
        window.addEventListener("resize", updateActive);
        document.addEventListener("DOMContentLoaded", function () {
          updateActive();
        });
        updateActive();
      })();
    </script>
    {% endif %}

    <script>
      (function () {
        var themeToggle = document.getElementById("theme-toggle");
        var root = document.documentElement;
        function getStoredTheme() {
          try { return localStorage.getItem("theme"); } catch (e) { return null; }
        }
        function applyTheme(theme) {
          if (theme === "dark") {
            root.setAttribute("data-theme", "dark");
            if (themeToggle) {
              themeToggle.textContent = "Light mode";
              themeToggle.setAttribute("aria-label", "切换到浅色模式");
              themeToggle.setAttribute("title", "切换到浅色模式");
            }
          } else {
            root.removeAttribute("data-theme");
            if (themeToggle) {
              themeToggle.textContent = "Dark mode";
              themeToggle.setAttribute("aria-label", "切换到深色模式");
              themeToggle.setAttribute("title", "切换到深色模式");
            }
          }
        }
        function initTheme() {
          var stored = getStoredTheme();
          if (stored === "dark" || stored === "light") {
            applyTheme(stored);
            return;
          }
          if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            applyTheme("dark");
          } else {
            applyTheme("light");
          }
        }
        initTheme();
        if (themeToggle) {
          themeToggle.addEventListener("click", function () {
            var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
            applyTheme(next);
            try { localStorage.setItem("theme", next); } catch (e) {}
          });
        }
      })();
    </script>
    <script>
      (function () {
        function addCopyButtons() {
          document.querySelectorAll("pre.highlight").forEach(function (pre) {
            if (pre.querySelector(".copy-code-btn")) return;
            var btn = document.createElement("button");
            btn.className = "copy-code-btn";
            btn.type = "button";
            btn.textContent = "复制";
            btn.setAttribute("aria-label", "复制代码");
            var code = pre.querySelector("code");
            btn.addEventListener("click", function () {
              var text = code ? code.innerText : pre.innerText;
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function () {
                  btn.textContent = "已复制";
                  setTimeout(function () { btn.textContent = "复制"; }, 2000);
                });
              }
            });
            pre.style.position = "relative";
            pre.appendChild(btn);
          });
        }
        var COLLAPSE_LINE_THRESHOLD = 30;
        function initCollapsibleCode() {
          document.querySelectorAll("pre.highlight").forEach(function (pre) {
            var code = pre.querySelector("code");
            var text = code ? code.textContent : pre.innerText;
            var lines = text ? text.split("\n").length : 0;
            if (lines <= COLLAPSE_LINE_THRESHOLD || pre.classList.contains("code-block-collapsible")) return;
            pre.classList.add("code-block-collapsible", "code-block-collapsed");
            var wrapper = document.createElement("div");
            wrapper.className = "code-block-wrapper";
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "code-block-expand-btn";
            btn.setAttribute("aria-label", "展开代码");
            btn.textContent = "展开";
            btn.addEventListener("click", function () {
              var isCollapsed = pre.classList.toggle("code-block-collapsed");
              btn.textContent = isCollapsed ? "展开" : "收起";
              btn.setAttribute("aria-label", isCollapsed ? "展开代码" : "收起代码");
            });
            wrapper.appendChild(btn);
          });
        }
        function initExpandExcerpt() {
          document.querySelectorAll(".post-link-expand").forEach(function (b) {
            b.addEventListener("click", function () {
              var ex = this.closest(".post-excerpt");
              if (ex) { ex.classList.add("is-expanded"); this.setAttribute("aria-expanded", "true"); }
            });
          });
        }
        function stripMediaFromExcerpts() {
          document.querySelectorAll(".post-excerpt-content").forEach(function (block) {
            block.querySelectorAll("img").forEach(function (el) { el.remove(); });
            block.querySelectorAll("table").forEach(function (el) { el.remove(); });
          });
        }
        function onReady() {
          addCopyButtons();
          initCollapsibleCode();
          initExpandExcerpt();
          stripMediaFromExcerpts();
        }
        if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", onReady);
        else onReady();
      })();
    </script>
    <script>
      (function () {
        function replaceFeather() {
          if (window.feather && typeof window.feather.replace === "function") window.feather.replace();
        }
        replaceFeather();
        document.addEventListener("DOMContentLoaded", replaceFeather, { once: true });
      })();
    </script>
    <script>
      (function () {
        var progressFill = document.getElementById("reading-progress-fill");
        var backToTop = document.getElementById("back-to-top");
        if (!progressFill && !backToTop) return;

        function onScroll() {
          var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          var docHeight = document.documentElement.scrollHeight - window.innerHeight;

          if (progressFill && docHeight > 0) {
            progressFill.style.width = Math.min(100, (scrollTop / docHeight) * 100) + "%";
          }
          if (backToTop) {
            if (scrollTop > 400) {
              backToTop.classList.add("visible");
            } else {
              backToTop.classList.remove("visible");
            }
          }
        }

        function scrollToTop(e) {
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();
        if (backToTop) backToTop.addEventListener("click", scrollToTop);
      })();
    </script>
    <script>
      (function () {
        function onScrollClass() {
          var top = window.pageYOffset || document.documentElement.scrollTop;
          if (top > 60) document.body.classList.add("is-scrolled"); else document.body.classList.remove("is-scrolled");
        }
        window.addEventListener("scroll", onScrollClass, { passive: true });
        onScrollClass();
      })();
    </script>
    <script>
      (function () {
        function initMermaid() {
          if (typeof window.mermaid === "undefined") return;

          var container = document.querySelector("#main .container");
          if (!container) return;

          var blocks = container.querySelectorAll("pre code.language-mermaid");
          if (!blocks.length) return;

          var isDark = document.documentElement.getAttribute("data-theme") === "dark";
          window.mermaid.initialize({
            startOnLoad: false,
            theme: isDark ? "dark" : "default",
            securityLevel: "loose"
          });

          blocks.forEach(function (code) {
            var pre = code.closest("pre");
            if (!pre) return;
            var parent = pre.parentNode;
            var div = document.createElement("div");
            div.className = "mermaid-wrapper";
            div.setAttribute("data-mermaid", "true");
            div.textContent = code.textContent.trim();
            parent.replaceChild(div, pre);
          });

          window.mermaid.run({ querySelector: ".mermaid-wrapper", suppressErrors: true });
        }

        if (document.readyState === "complete") {
          initMermaid();
        } else {
          window.addEventListener("load", initMermaid);
        }
      })();
    </script>
  </body>
</html>
